name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/smwu-nuda/nuda-server

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 900s
          script: |
            set -euo pipefail

            cd ~/nuda-server

            # upstream.conf 보존 후 코드 최신화
            [ -f nginx/upstream.conf ] && cp nginx/upstream.conf /tmp/upstream.conf.bak.${{ github.run_id }}
            git fetch origin && git reset --hard ${{ github.sha }}
            [ -f /tmp/upstream.conf.bak.${{ github.run_id }} ] && mv /tmp/upstream.conf.bak.${{ github.run_id }} nginx/upstream.conf
            [ -f nginx/upstream.conf ] || echo "server app-blue:8080;" > nginx/upstream.conf

            docker compose up -d redis elasticsearch

            # 인프라 컨테이너 시작 대기
            echo "Redis 준비 대기 중..."
            redis_wait=0
            until docker exec nuda-redis redis-cli ping 2>/dev/null | grep -q PONG; do
              if [[ $redis_wait -ge 60 ]]; then echo "[ERROR] Redis 기동 타임아웃 (60초)." >&2; exit 1; fi
              sleep 2; redis_wait=$((redis_wait + 2))
            done
            echo "Elasticsearch 준비 대기 중..."
            es_wait=0
            until curl -sf http://localhost:9200/_cluster/health 2>/dev/null | grep -qE '"status":"(green|yellow)"'; do
              if [[ $es_wait -ge 180 ]]; then echo "[ERROR] Elasticsearch 기동 타임아웃 (180초)." >&2; exit 1; fi
              sleep 5; es_wait=$((es_wait + 5))
            done

            # Blue/Green 전환 app 배포 (GHCR 로그인은 SSM 토큰 사용)
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
            bash scripts/deploy.sh

            # 모니터링 스택 설정 반영
            docker compose -f docker-compose.monitoring.yml up -d
            curl -s -X POST http://localhost:9090/-/reload || true

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="🤭 배포 성공: nuda-server ${{ needs.build.outputs.image-tag }}\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            MESSAGE="🙄 배포 실패: nuda-server ${{ needs.build.outputs.image-tag }}\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${MESSAGE}\"}"
