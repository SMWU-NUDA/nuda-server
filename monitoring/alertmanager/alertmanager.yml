global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'slot']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'discord-critical'
      repeat_interval: 1h

receivers:
  - name: 'default'
    discord_configs:
      - webhook_url: '__DISCORD_WEBHOOK_URL__'
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          슬롯: {{ .Labels.slot }}
          {{ end }}
        send_resolved: true

  - name: 'discord-critical'
    discord_configs:
      - webhook_url: '__DISCORD_WEBHOOK_URL__'
        title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          슬롯: {{ .Labels.slot }}
          {{ end }}
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['slot']