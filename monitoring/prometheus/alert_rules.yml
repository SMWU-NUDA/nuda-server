groups:
  - name: nuda-app
    rules:
      # Blue, Green 슬롯이 모두 다운된 경우만 알람 (서비스 완전 중단)
      - alert: AppDown
        expr: sum(up{job=~"nuda-app-.*"}) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "전체 앱 다운 — 서비스 중단"
          description: "blue/green 슬롯이 모두 2분 이상 응답하지 않습니다. 즉각 대응 필요."

      # HTTP 5xx 에러율 > 5%
      - alert: HighErrorRate
        expr: |
          (
            sum by (slot) (rate(http_server_requests_seconds_count{status=~"5..",job=~"nuda-app-.*"}[5m]))
            /
            sum by (slot) (rate(http_server_requests_seconds_count{job=~"nuda-app-.*"}[5m]))
          ) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "높은 HTTP 5xx 에러율"
          description: "{{ $labels.slot }} 슬롯의 5xx 에러율이 {{ $value | humanizePercentage }} 입니다."

      # HTTP p99 응답시간 > 2초
      - alert: SlowResponse
        expr: |
          histogram_quantile(0.99,
            sum by (le, slot) (rate(http_server_requests_seconds_bucket{job=~"nuda-app-.*"}[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "응답 시간 지연"
          description: "{{ $labels.slot }} 슬롯의 p99 응답시간이 {{ $value | humanizeDuration }} 입니다."

  - name: nuda-jvm
    rules:
      # JVM 힙 메모리 사용률 > 85%
      - alert: HighHeapUsage
        expr: |
          (
            sum by (slot) (jvm_memory_used_bytes{area="heap", job=~"nuda-app-.*"})
            /
            sum by (slot) (jvm_memory_max_bytes{area="heap", job=~"nuda-app-.*"})
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 힙 메모리 사용률 높음"
          description: "{{ $labels.slot }} 슬롯의 힙 사용률이 {{ $value | humanizePercentage }} 입니다."

      # GC 일시정지 시간 > 500ms (1분 평균)
      - alert: HighGcPause
        expr: |
          rate(jvm_gc_pause_seconds_sum{job=~"nuda-app-.*"}[1m])
          /
          rate(jvm_gc_pause_seconds_count{job=~"nuda-app-.*"}[1m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GC 일시정지 시간 증가"
          description: "{{ $labels.slot }} 슬롯의 평균 GC 일시정지가 {{ $value | humanizeDuration }} 입니다."